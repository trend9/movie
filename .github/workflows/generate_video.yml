name: Generate Vertical Video

on:
  push:
    branches:
      - main
  schedule:
    # Run once every hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allows manual run

jobs:
  build-and-generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-lcm-dreamshaper-v7
          restore-keys: |
            hf-models-

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-models-gemma2-2b
          restore-keys: |
            ollama-models-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install diffusers transformers accelerate fastapi uvicorn requests pillow pydantic
          pip install -r requirements.txt

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama & Local API Server
        run: |
          # Start Ollama
          ollama serve &
          
          # Wait for Ollama to start
          echo "Waiting for Ollama to start..."
          until curl -s http://localhost:11434 > /dev/null; do sleep 1; done
          echo "Ollama is running. Pulling gemma2:2b..."
          ollama pull gemma2:2b
          
          # Start the local API server in the background
          python local_api_server.py &
          echo "Waiting for local API server to start..."
          until curl -s http://127.0.0.1:8000 > /dev/null; do sleep 1; done
          echo "Local API server is ready!"

      - name: Run video generation script
        env:
          LOCAL_API_URL: "http://127.0.0.1:8000"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_video.py

      - name: Commit and push generated video and history
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f output_action/ data/history.json
          if ls data/video_*.json 1> /dev/null 2>&1; then
            git add -f data/video_*.json
          fi
          # Only commit and push if there are changes (new video generated)
          if ! git diff --cached --quiet; then
            git commit -m "Auto-generate hourly vertical video and update history [skip ci]"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit"
          fi
